site_name: Dokumentasi Core Banking BPR
site_description: Panduan pengguna aplikasi Core Banking untuk Bank Perkreditan Rakyat
site_url: https://core-banking-docs.test

theme:
  name: material
  language: id
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Mode Gelap
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Mode Terang
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.tabs.link
  icon:
    logo: material/bank
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search:
      lang: id
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Beranda: index.md
  - Memulai:
    - Login & Navigasi: memulai/login-navigasi.md
    - Peran Pengguna: memulai/peran-pengguna.md
