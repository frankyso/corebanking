    - Hari Libur: master-data/hari-libur.md
    - Nasabah: master-data/nasabah.md
    - Produk Tabungan: master-data/produk-tabungan.md
    - Rekening Tabungan: master-data/rekening-tabungan.md
    - Produk Deposito: master-data/produk-deposito.md
    - Rekening Deposito: master-data/rekening-deposito.md
    - Produk Kredit: master-data/produk-kredit.md
  - Teller:
    - Dashboard Teller: teller/dashboard-teller.md
